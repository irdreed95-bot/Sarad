name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Install Core Dependencies
      run: |
        pnpm install --no-frozen-lockfile

    - name: Build Web App & Ensure Assets Directory
      run: |
        cd artifacts/sarad
        # تثبيت حزم كاباسيتور محلياً للتأكد من التعرف عليها
        pnpm add @capacitor/core @capacitor/cli @capacitor/android --save-dev
        
        # بناء الويب مباشرة عبر vite لتخطي أخطاء type-check المعطلة للمجلد
        pnpm exec vite build
        
        # [تطبيق تحقق كوبايلوت] التأكد الصارم من وجود المجلد والملف قبل الانتقال لكاباسيتور
        mkdir -p dist
        if [ ! -f dist/index.html ]; then
          echo "ERROR: dist/index.html not found after build!"
          echo "Contents of dist directory:"
          ls -la dist || echo "dist directory does not exist!"
          exit 1
        fi
      env:
        PORT: 3000
        BASE_PATH: /

    - name: Clean & Force Add Android Platform
      run: |
        cd artifacts/sarad
        
        # كتابة ملف الإعدادات النقي وتوجيهه لمجلد dist المستخرج بنجاح
        cat << 'INNER_EOF' > capacitor.config.json
        {
          "appId": "com.sarad.app",
          "appName": "Sarad",
          "webDir": "dist"
        }
        INNER_EOF
        
        # مسح أي مخلفات قديمة وإعادة بناء المنصة بشكل سليم
        rm -rf android
        pnpm exec cap add android
        pnpm exec cap sync android

        - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Build APK with Gradle
      run: |
        cd artifacts/sarad/android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sarad-app-debug-apk
        path: artifacts/sarad/android/app/build/outputs/apk/debug/app-debug.apk
