name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Install Dependencies
      run: |
        pnpm install --no-frozen-lockfile
        cd artifacts/sarad
        pnpm add -D @capacitor/cli @capacitor/android

    - name: Build Web App
      run: |
        cd artifacts/sarad
        pnpm run build

    - name: Clean and Reconstruct Capacitor Android
      run: |
        cd artifacts/sarad
        
        # 1. إجبار السيرفر على كتابة ملف إعدادات نقي يوجه مباشرة لمجلد dist
        cat << 'INNER_EOF' > capacitor.config.json
        {
          "appId": "com.sarad.app",
          "appName": "Sarad",
          "webDir": "dist"
        }
        INNER_EOF
        
        # 2. مسح مجلد الأندرويد القديم تماماً لمنع أي ملفات تالفة أو تعارض
        rm -rf android
        
        # 3. إعادة إنشاء منصة الأندرويد وعمل المزامنة بشكل نظيف وآلي
        pnpm exec cap add android
        pnpm exec cap sync android

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Build APK with Gradle
      run: |
        cd artifacts/sarad/android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sarad-app-debug-apk
        path: artifacts/sarad/android/app/build/outputs/apk/debug/app-debug.apk
