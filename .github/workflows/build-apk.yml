name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Install Core Dependencies
      run: |
        pnpm install --no-frozen-lockfile

    - name: Configure and Build Sub-App (Sarad)
      run: |
        cd artifacts/sarad
        # تثبيت حزم كاباسيتور داخل مجلد التطبيق مباشرة كما اقترح مساعد الطيار
        pnpm add @capacitor/core @capacitor/cli @capacitor/android --save-dev
        
        # بناء ملفات الويب
        pnpm run build

    - name: Clean & Force Add Android Platform
      run: |
        cd artifacts/sarad
        
        # إنشاء ملف الإعدادات النظيف
        cat << 'INNER_EOF' > capacitor.config.json
        {
          "appId": "com.sarad.app",
          "appName": "Sarad",
          "webDir": "dist"
        }
        INNER_EOF
        
        # مسح أي مخلفات قديمة وإعادة البناء النظيف من الصفر
        rm -rf android
        pnpm exec cap add android
        pnpm exec cap sync android

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Build APK with Gradle
      run: |
        cd artifacts/sarad/android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sarad-app-debug-apk
        path: artifacts/sarad/android/app/build/outputs/apk/debug/app-debug.apk
