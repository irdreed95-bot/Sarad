name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Install Core Dependencies
      run: |
        pnpm install --no-frozen-lockfile

    - name: Build Web App & Ensure Assets Directory
      run: |
        cd artifacts/sarad
        # تثبيت حزم كاباسيتور محلياً للتأكد من التعرف عليها
        pnpm add @capacitor/core @capacitor/cli @capacitor/android --save-dev
        
        # تشغيل بناء الويب لتوليد الملفات
        pnpm run build
        
        # [تطبيق نصيحة كوبايلوت] إجبار السيرفر على التأكد من وجود مجلد dist لمنع اعتراض كاباسيتور
        mkdir -p dist

    - name: Clean & Force Add Android Platform
      run: |
        cd artifacts/sarad
        
        # كتابة ملف الإعدادات وربطه بمجلد dist المضمون وجوده الآن
        cat << 'INNER_EOF' > capacitor.config.json
        {
          "appId": "com.sarad.app",
          "appName": "Sarad",
          "webDir": "dist"
        }
        INNER_EOF
        
        # تنظيف أي مخلفات قديمة وبناء المنصة من الصفر بنقاء
        rm -rf android
        pnpm exec cap add android
        pnpm exec cap sync android

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Build APK with Gradle
      run: |
        cd artifacts/sarad/android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sarad-app-debug-apk
        path: artifacts/sarad/android/app/build/outputs/apk/debug/app-debug.apk
