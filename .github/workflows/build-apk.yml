name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Isolate App (Bypass Workspace Issues)
      run: |
        # نقل كل ملفات التطبيق للرئيسية للتخلص من عقدة المجلدات المتداخلة
        cp -r artifacts/sarad/* .
        cp -r artifacts/sarad/.* . 2>/dev/null || true
        # مسح إعدادات الـ Workspace تماماً ليعمل السيرفر كأنه تطبيق قياسي
        rm -rf artifacts pnpm-workspace.yaml pnpm-lock.yaml package-lock.json node_modules

    - name: Install Dependencies
      run: |
        npm install --legacy-peer-deps
        npm install @capacitor/cli @capacitor/android --save-dev

    - name: Build Web App
      run: |
        PORT=3000 BASE_PATH=/ npx vite build || npm run build
        mkdir -p dist www
        cp -r dist/* www/ 2>/dev/null || true

    - name: Initialize & Sync Capacitor Android
      run: |
        npx cap init "Sarad" "com.sarad.app" --web-dir=dist || true
        npx cap add android || true
        npx cap sync android

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Build APK with Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sarad-app-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
