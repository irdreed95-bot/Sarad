name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Install All Dependencies
      run: |
        pnpm install --no-frozen-lockfile
        cd artifacts/sarad
        pnpm install --no-frozen-lockfile || npm install
        pnpm add -D @capacitor/cli @capacitor/android

    - name: Build Web App & Configure Capacitor
      run: |
        cd artifacts/sarad
        
        # بناء ملفات الويب وتوليد مجلد dist
        PORT=3000 BASE_PATH=/ npx vite build
        
        # حقن ملف الإعدادات بشكل إجباري ومباشر داخل السيرفر لمنع خطأ الـ appId
        cat << 'INNER_EOF' > capacitor.config.json
        {
          "appId": "com.sarad.app",
          "appName": "Sarad",
          "webDir": "dist"
        }
        INNER_EOF
        
        # مسح أي مجلد أندرويد قديم متضارب لضمان بناء نظيف 100%
        rm -rf android
        
        # تشغيل الأوامر عبر المسار المحلي للحزم لتفادي ضياع npx في الـ workspace
        ./node_modules/.bin/cap add android
        ./node_modules/.bin/cap sync android

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Build APK with Gradle
      run: |
        cd artifacts/sarad/android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sarad-app-debug-apk
        path: artifacts/sarad/android/app/build/outputs/apk/debug/app-debug.apk
