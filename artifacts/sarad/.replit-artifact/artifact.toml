kind = "web"
previewPath = "/"
title = "Sarad | سرّاد"
version = "1.0.0"
id = "artifacts/sarad"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26054

[services.development]
run = "pnpm --filter @workspace/sarad run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sarad", "run", "build" ]
publicDir = "artifacts/sarad/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26054"
BASE_PATH = "/"
